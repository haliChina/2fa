<html lang="zh">
<head>

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%2338bdf8' d='M12 1L3 5v6c0 5.25 3.75 10.15 9 11.25C17.25 21.15 21 16.25 21 11V5L12 1zm0 4l6 2.67V11c0 3.5-2.33 6.79-6 8.04C8.33 17.79 6 14.5 6 11V7.67L12 5z'/%3E%3C/svg%3E"/>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080c14;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --border-active: rgba(99,179,237,0.5);
      --accent: #38bdf8;
      --accent-glow: rgba(56,189,248,0.3);
      --accent2: #818cf8;
      --code-color: #67e8f9;
      --danger: #f87171;
      --success: #4ade80;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --text-dim: #334155;
      --radius-sm: 10px;
      --radius-lg: 24px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(56,189,248,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 80%, rgba(129,140,248,0.06) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; opacity: 0.5; z-index: 0;
    }

    .app {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 2rem 1rem 4rem;
    }

    /* ── Header ── */
    .header {
      width: 100%; max-width: 420px;
      display: flex; align-items: center;
      margin-bottom: 2rem; padding-top: 0.5rem;
    }

    .header-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }

    .header-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 16px var(--accent-glow);
    }
    .header-icon svg { width: 18px; height: 18px; fill: #fff; }

    .header-text { min-width: 0; }
    .header-title { font-size: 1.05rem; font-weight: 700; letter-spacing: -0.01em; line-height: 1.2; }
    .header-sub { font-size: 0.72rem; color: var(--text-muted); }

    /* 回到旧版 button */
    .legacy-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 0.4rem 0.85rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem; font-weight: 500;
      cursor: pointer; text-decoration: none;
      transition: all 0.2s;
      white-space: nowrap; flex-shrink: 0;
      margin-left: 10px;
    }
    .legacy-btn svg { width: 12px; height: 12px; fill: currentColor; opacity: 0.7; }
    .legacy-btn:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.16); color: var(--text); }

    /* ── Code Card ── */
    #codeArea { width: 100%; max-width: 420px; margin-bottom: 1.25rem; }
    #codeArea.hidden { display: none !important; }

    .code-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem 1.5rem 1.5rem;
      position: relative; overflow: hidden;
      cursor: pointer;
      transition: border-color 0.3s, box-shadow 0.3s, transform 0.2s;
      animation: fadeUp 0.4s ease-out;
    }
    .code-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(56,189,248,0.4), transparent);
    }
    .code-card:hover {
      border-color: rgba(56,189,248,0.25);
      box-shadow: 0 0 40px rgba(56,189,248,0.08), 0 20px 40px rgba(0,0,0,0.4);
      transform: translateY(-1px);
    }
    .code-card:active { transform: translateY(0); }

    .code-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .code-account-badge { display: flex; align-items: center; gap: 8px; }

    /* Avatars */
    .avatar {
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden;
    }
    .avatar.brand { background: #fff; }
    .avatar.letter { font-size: 0.72rem; font-weight: 700; color: #fff; font-family: 'DM Sans', sans-serif; }
    .avatar svg { width: 100%; height: 100%; display: block; }

    /* sizes */
    .avatar-sm  { width: 28px; height: 28px; border-radius: 8px; }
    .avatar-md  { width: 32px; height: 32px; border-radius: 9px; }
    /* brand padding */
    .avatar.brand.avatar-sm { padding: 4px; }
    .avatar.brand.avatar-md { padding: 5px; }

    #currentAccountName {
      font-size: 0.82rem; font-weight: 600;
      color: var(--text-muted); letter-spacing: 0.01em;
    }

    .copy-hint {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.72rem; color: var(--text-dim); font-weight: 500;
      transition: color 0.2s;
    }
    .copy-hint svg { width: 12px; height: 12px; fill: currentColor; }
    .code-card:hover .copy-hint { color: var(--accent); }

    /* Digits */
    .code-display-wrap {
      display: flex; align-items: center; justify-content: center;
      gap: 0.5rem; margin-bottom: 1.5rem;
    }
    .code-group { display: flex; gap: 4px; }
    .code-digit {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 2.8rem; font-weight: 700;
      color: var(--code-color); line-height: 1;
      text-shadow: 0 0 20px rgba(103,232,249,0.5);
      min-width: 1.6rem; text-align: center;
    }
    .code-digit.invalid { font-size: 1.2rem; color: var(--danger); text-shadow: none; }
    .code-sep { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); align-self: center; margin: 0 2px; }

    @keyframes digitFlip {
      0%   { transform: translateY(-8px); opacity: 0; }
      100% { transform: translateY(0);    opacity: 1; }
    }
    .digit-flip { animation: digitFlip 0.25s ease-out; }

    /* Ring + bar */
    .progress-section { display: flex; align-items: center; gap: 10px; }
    .ring-wrap { position: relative; width: 36px; height: 36px; flex-shrink: 0; }
    .ring-wrap svg { transform: rotate(-90deg); width: 36px; height: 36px; }
    .ring-bg  { fill: none; stroke: rgba(255,255,255,0.07); stroke-width: 3; }
    .ring-prog {
      fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round;
      stroke-dasharray: 88; stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear, stroke 0.3s;
    }
    .ring-prog.urgent { stroke: var(--danger); }
    .ring-text {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; font-weight: 600; color: var(--text-muted);
    }
    .progress-info { flex: 1; }
    .progress-bar-outer { height: 4px; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; margin-bottom: 5px; }
    .progress-bar-inner {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      transition: width 1s linear, background 0.3s;
    }
    .progress-bar-inner.urgent { background: linear-gradient(90deg, #dc2626, var(--danger)); }
    .timer-text { font-size: 0.75rem; color: var(--text-muted); font-weight: 500; }

    /* ── Accounts ── */
    .section-label {
      width: 100%; max-width: 420px;
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 0.6rem; padding-left: 2px;
    }
    .accounts-list {
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column; gap: 6px;
      max-height: 240px; overflow-y: auto;
      margin-bottom: 1.25rem; padding-right: 2px;
    }
    .accounts-list:empty { display: none; }
    .accounts-list::-webkit-scrollbar { width: 4px; }
    .accounts-list::-webkit-scrollbar-track { background: transparent; }
    .accounts-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }

    .account-item {
      display: flex; align-items: center; gap: 10px;
      padding: 0.7rem 0.85rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer; transition: all 0.2s ease;
    }
    .account-item:hover { background: var(--surface-hover); border-color: rgba(99,179,237,0.2); transform: translateX(2px); }
    .account-item.active {
      border-color: rgba(56,189,248,0.4); background: rgba(56,189,248,0.06);
      box-shadow: 0 0 0 1px rgba(56,189,248,0.15) inset;
    }
    .account-info { flex: 1; min-width: 0; }
    .account-name { font-weight: 600; font-size: 0.85rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .account-issuer { font-size: 0.72rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .account-active-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 6px var(--accent);
      flex-shrink: 0; opacity: 0; transition: opacity 0.2s;
    }
    .account-item.active .account-active-dot { opacity: 1; }
    .account-delete {
      background: none; border: none; color: var(--text-dim);
      cursor: pointer; padding: 4px; border-radius: 6px;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.2s;
    }
    .account-delete svg { width: 14px; height: 14px; fill: currentColor; }
    .account-delete:hover { background: rgba(248,113,113,0.12); color: var(--danger); }

    /* ── Panel ── */
    .panel {
      width: 100%; max-width: 420px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 1.4rem;
    }
    .panel-title { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 1rem; }
    .input-row { position: relative; margin-bottom: 0.75rem; }
    .field-input {
      width: 100%;
      padding: 0.85rem 2.75rem 0.85rem 1rem;
      font-size: 0.9rem; font-family: 'DM Sans', sans-serif; font-weight: 500;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); outline: none;
      transition: all 0.2s;
    }
    .field-input::placeholder { color: var(--text-dim); }
    .field-input:focus { border-color: var(--border-active); background: rgba(56,189,248,0.04); box-shadow: 0 0 0 3px rgba(56,189,248,0.08); }
    .field-input.mono { font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; letter-spacing: 0.04em; }
    .field-icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); }
    .clear-btn {
      background: rgba(255,255,255,0.08); border: none; color: var(--text-muted);
      width: 22px; height: 22px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 11px; opacity: 0; visibility: hidden; transition: all 0.2s;
    }
    .clear-btn.visible { opacity: 1; visibility: visible; }
    .clear-btn:hover { background: rgba(255,255,255,0.15); color: var(--text); }
    .btn-row { display: flex; gap: 8px; margin-top: 0.25rem; }
    .btn-icon {
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      color: var(--text-muted); width: 44px; height: 44px;
      border-radius: var(--radius-sm); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.2s;
    }
    .btn-icon svg { width: 18px; height: 18px; fill: currentColor; }
    .btn-icon:hover { background: rgba(255,255,255,0.1); color: var(--text); border-color: rgba(255,255,255,0.15); }
    .btn-primary {
      flex: 1; height: 44px;
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600;
      background: linear-gradient(135deg, rgba(56,189,248,0.9), rgba(129,140,248,0.9));
      color: #fff; border: none; border-radius: var(--radius-sm);
      cursor: pointer; transition: all 0.2s;
      letter-spacing: 0.01em; position: relative; overflow: hidden;
    }
    .btn-primary::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg,rgba(255,255,255,0.15),transparent); opacity: 0; transition: opacity 0.2s; }
    .btn-primary:hover::before { opacity: 1; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(56,189,248,0.25); }
    .btn-primary:active { transform: translateY(0); }
    #fileInput { display: none; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(15,23,42,0.95); border: 1px solid var(--border); color: var(--text);
      padding: 0.65rem 1.25rem; border-radius: 999px;
      font-size: 0.85rem; font-weight: 500; opacity: 0;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 1000; backdrop-filter: blur(12px);
      white-space: nowrap; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: rgba(74,222,128,0.3); color: var(--success); }
    .toast.error   { border-color: rgba(248,113,113,0.3); color: var(--danger); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseGlow {
      0%,100% { text-shadow: 0 0 20px rgba(103,232,249,0.5); }
      50%      { text-shadow: 0 0 30px rgba(103,232,249,0.8), 0 0 60px rgba(103,232,249,0.3); }
    }
    .code-digit:not(.invalid) { animation: pulseGlow 3s ease-in-out infinite; }

    @media (max-width: 480px) {
      .app { padding: 1.5rem 0.75rem 3rem; }
      .code-digit { font-size: 2.4rem; }
      .header-sub { display: none; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ── Header ── -->
  <div class="header">
    <div class="header-left">
      <div class="header-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 1L3 5v6c0 5.25 3.75 10.15 9 11.25C17.25 21.15 21 16.25 21 11V5L12 1zm0 4l6 2.67V11c0 3.5-2.33 6.79-6 8.04C8.33 17.79 6 14.5 6 11V7.67L12 5z"/>
        </svg>
      </div>
      <div class="header-text">
        <div class="header-title">2FA Authenticator</div>
        <div class="header-sub">安全验证码管理器</div>
      </div>
    </div>

    <a href="old.html" class="legacy-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
      </svg>
      回到旧版 (数据互通)
    </a>
  </div>

  <!-- ── Code Display ── -->
  <div id="codeArea" class="hidden">
    <div class="code-card" id="codeCard">
      <div class="code-header">
        <div class="code-account-badge">
          <div id="codeAvatar"></div>
          <div id="currentAccountName"></div>
        </div>
        <div class="copy-hint">
          <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
          点击复制
        </div>
      </div>
      <div class="code-display-wrap">
        <div class="code-group" id="codeGroup1"></div>
        <div class="code-sep"></div>
        <div class="code-group" id="codeGroup2"></div>
      </div>
      <div class="progress-section">
        <div class="ring-wrap">
          <svg viewBox="0 0 36 36">
            <circle class="ring-bg" cx="18" cy="18" r="14"/>
            <circle class="ring-prog" id="ringProg" cx="18" cy="18" r="14"/>
          </svg>
          <div class="ring-text" id="ringText">30</div>
        </div>
        <div class="progress-info">
          <div class="progress-bar-outer">
            <div class="progress-bar-inner" id="progressBar"></div>
          </div>
          <div class="timer-text" id="timerBox">即将更新</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Saved Accounts ── -->
  <div class="section-label" id="accountsLabel" style="display:none">已保存账户</div>
  <div id="accountsList" class="accounts-list"></div>

  <!-- ── Input Panel ── -->
  <div class="panel">
    <div class="panel-title">添加账户</div>
    <div class="input-row">
      <input type="text" id="secret" class="field-input mono" placeholder="2FA 密钥 (Base32)" spellcheck="false" autocomplete="off" />
      <div class="field-icon"><button id="clearBtn" class="clear-btn" title="清空">x</button></div>
    </div>
    <div class="input-row">
      <input type="text" id="accountName" class="field-input" placeholder="账户名称（可选）" spellcheck="false" autocomplete="off" />
    </div>
    <div class="btn-row">
      <button class="btn-icon" id="scanBtn" title="扫描二维码图片">
        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <path d="m21.001 24.001h-10.001c-1.654 0-3-1.346-3-3v-10c0-1.654 1.346-3 3-3h10c1.654 0 3 1.346 3 3v10c.001 1.654-1.345 3-2.999 3zm-16.001-14c.552 0 1-.448 1-1v-2c0-.551.449-1 1-1h2c.552 0 1-.448 1-1s-.448-1-1-1h-2c-1.654 0-3 1.346-3 3v2c0 .552.448 1 1 1zm20-6h-2c-.553 0-1 .448-1 1s.447 1 1 1h2c.552 0 1 .449 1 1v2c0 .552.447 1 1 1s1-.448 1-1v-2c0-1.654-1.346-3-3-3zm-16 21.999h-2c-.551 0-1-.448-1-1v-2c0-.553-.448-1-1-1s-1 .447-1 1v2c0 1.654 1.346 3 3 3h2c.552 0 1-.447 1-1s-.447-1-1-1zm18-4c-.553 0-1 .447-1 1v2c0 .552-.448 1-1 1h-2c-.553 0-1 .447-1 1s.447 1 1 1h2c1.654 0 3-1.346 3-3v-2c0-.553-.447-1-1-1z"/>
        </svg>
      </button>
      <button class="btn-primary" id="saveBtn">保存账户</button>
    </div>
    <input type="file" id="fileInput" accept="image/*" />
  </div>

</div>
<div id="toast" class="toast"></div>

<script>

const AVATAR_COLORS = [
  'linear-gradient(135deg,#38bdf8,#818cf8)',
  'linear-gradient(135deg,#4ade80,#22d3ee)',
  'linear-gradient(135deg,#fb923c,#f43f5e)',
  'linear-gradient(135deg,#a78bfa,#ec4899)',
  'linear-gradient(135deg,#facc15,#f97316)',
  'linear-gradient(135deg,#2dd4bf,#6366f1)',
];

function getAvatarColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffffffff;
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}

function getInitials(name) {
  const parts = name.trim().split(/\s+/);
  return parts.length >= 2
    ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase()
    : name.slice(0, 2).toUpperCase();
}

function detectPlatform(name, issuer) {
  const s = ((name || '') + ' ' + (issuer || '')).toLowerCase();
  return PLATFORMS.find(p => p.keys.some(k => s.includes(k))) || null;
}

// Builds avatar HTML string for account list items
function buildAvatarHtml(name, issuer, size) {
  const p = detectPlatform(name, issuer);
  if (p) {
    return `<div class="avatar brand avatar-md" style="width:${size}px;height:${size}px;background:${p.bg};border-radius:9px;padding:${size===32?5:4}px;">${p.svg}</div>`;
  }
  return `<div class="avatar letter avatar-md" style="width:${size}px;height:${size}px;background:${getAvatarColor(name||'')};border-radius:9px;">${getInitials(name||'UA')}</div>`;
}

// Sets the code card avatar element directly
function setCodeAvatar(name, issuer) {
  const el = document.getElementById('codeAvatar');
  const p  = detectPlatform(name, issuer);
  if (p) {
    el.className = 'avatar brand avatar-sm';
    el.style.background = p.bg;
    el.style.borderRadius = '8px';
    el.style.padding = '4px';
    el.innerHTML = p.svg;
  } else {
    el.className = 'avatar letter avatar-sm';
    el.style.background = getAvatarColor(name || '');
    el.style.borderRadius = '8px';
    el.style.padding = '';
    el.textContent = getInitials(name || 'UA');
  }
}

// ── Main ──
document.addEventListener('DOMContentLoaded', () => {
  const codeCard           = document.getElementById('codeCard');
  const codeGroup1         = document.getElementById('codeGroup1');
  const codeGroup2         = document.getElementById('codeGroup2');
  const timerBox           = document.getElementById('timerBox');
  const progressBar        = document.getElementById('progressBar');
  const ringProg           = document.getElementById('ringProg');
  const ringText           = document.getElementById('ringText');
  const secretInput        = document.getElementById('secret');
  const accountNameInput   = document.getElementById('accountName');
  const clearBtn           = document.getElementById('clearBtn');
  const codeArea           = document.getElementById('codeArea');
  const saveBtn            = document.getElementById('saveBtn');
  const scanBtn            = document.getElementById('scanBtn');
  const accountsList       = document.getElementById('accountsList');
  const accountsLabel      = document.getElementById('accountsLabel');
  const fileInput          = document.getElementById('fileInput');
  const currentAccountName = document.getElementById('currentAccountName');
  const toastEl            = document.getElementById('toast');

  let accounts      = [];
  let currentSecret = null;
  let currentLabel  = '';
  let currentIssuer = '';
  let lastCode      = '';

  const STORAGE_KEY   = '2fa_accounts';
  const CIRCUMFERENCE = 2 * Math.PI * 14;

  function loadAccounts() {
    try { accounts = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { accounts = []; }
    renderAccounts();
  }

  function saveAccountsToStorage() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(accounts));
  }

  function addAccount(name, secret, issuer = '') {
    const id = Date.now().toString(36) + Math.random().toString(36).substr(2);
    const account = { id, name: name || '未命名账户', secret: secret.toUpperCase().replace(/\s/g, ''), issuer };
    accounts.push(account);
    saveAccountsToStorage();
    renderAccounts();
    return account;
  }

  function deleteAccount(id) {
    accounts = accounts.filter(a => a.id !== id);
    saveAccountsToStorage();
    renderAccounts();
    if (currentSecret && !accounts.find(a => a.secret === currentSecret)) {
      currentSecret = null;
      codeArea.classList.add('hidden');
    }
    showToast('账户已删除');
  }

  function selectAccount(account) {
    currentSecret = account.secret;
    currentIssuer = account.issuer || '';
    currentLabel  = account.issuer ? `${account.issuer} · ${account.name}` : account.name;
    secretInput.value      = account.secret;
    accountNameInput.value = account.name;
    currentAccountName.textContent = currentLabel;
    setCodeAvatar(account.name, account.issuer);
    codeArea.classList.remove('hidden');
    renderAccounts();
    update();
  }

  function renderAccounts() {
    if (!accounts.length) {
      accountsList.innerHTML = '';
      accountsLabel.style.display = 'none';
      return;
    }
    accountsLabel.style.display = '';
    accountsList.innerHTML = accounts.map(acc => `
      <div class="account-item ${currentSecret === acc.secret ? 'active' : ''}" data-id="${acc.id}">
        ${buildAvatarHtml(acc.name, acc.issuer, 32)}
        <div class="account-info">
          <div class="account-name">${escapeHtml(acc.name)}</div>
          <div class="account-issuer">${escapeHtml(acc.issuer || '手动添加')}</div>
        </div>
        <div class="account-active-dot"></div>
        <button class="account-delete" data-id="${acc.id}" title="删除">
          <svg viewBox="0 0 501.333 501.333" fill="currentColor">
            <path d="M425.6,71.467h-78.933V21.333C346.667,9.6,337.067,0,325.333,0H177.067c-11.733,0-21.333,9.6-21.333,21.333v50.133h-80C64,71.467,54.4,81.067,54.4,92.8v84.267C54.4,188.8,64,198.4,75.733,198.4h14.933l28.8,283.733c1.067,10.667,9.6,19.2,20.267,19.2H361.6c10.667,0,20.267-8.533,22.4-19.2L411.733,198.4H425.6c11.733,0,20.267-9.6,21.333-21.333V92.8C446.933,81.067,437.333,71.467,425.6,71.467zM197.333,41.6H304v29.867H197.333V41.6zM343.467,459.733H158.934L132.267,198.4h236.8L343.467,459.733zM405.333,155.733H97.067v-42.667h308.267V155.733z"/>
          </svg>
        </button>
      </div>
    `).join('');

    accountsList.querySelectorAll('.account-item').forEach(item => {
      item.addEventListener('click', e => {
        if (e.target.closest('.account-delete')) return;
        const acc = accounts.find(a => a.id === item.dataset.id);
        if (acc) selectAccount(acc);
      });
    });
    accountsList.querySelectorAll('.account-delete').forEach(btn => {
      btn.addEventListener('click', e => { e.stopPropagation(); deleteAccount(btn.dataset.id); });
    });
  }

  let toastTimer;
  function showToast(msg, type = '') {
    clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.className = 'toast show' + (type ? ' ' + type : '');
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2500);
  }

  function escapeHtml(t) {
    const d = document.createElement('div'); d.textContent = t; return d.innerHTML;
  }

  function renderCode(code, invalid = false) {
    codeGroup1.innerHTML = '';
    codeGroup2.innerHTML = '';
    if (invalid) {
      const s = document.createElement('span');
      s.className = 'code-digit invalid';
      s.textContent = code;
      codeGroup1.appendChild(s);
    } else {
      [...code].forEach((ch, i) => {
        const el = document.createElement('span');
        el.className = 'code-digit' + (ch !== (lastCode[i] || '') ? ' digit-flip' : '');
        el.textContent = ch;
        (i < 3 ? codeGroup1 : codeGroup2).appendChild(el);
      });
    }
    lastCode = code;
  }

  codeCard.addEventListener('click', () => {
    const digits = [...codeGroup1.querySelectorAll('.code-digit'), ...codeGroup2.querySelectorAll('.code-digit')];
    if (!digits.length || digits[0].classList.contains('invalid')) return;
    navigator.clipboard.writeText(digits.map(d => d.textContent).join(''))
      .then(() => showToast('已复制到剪贴板', 'success'));
  });

  clearBtn.addEventListener('click', () => {
    secretInput.value = accountNameInput.value = '';
    currentSecret = currentLabel = currentIssuer = '';
    codeArea.classList.add('hidden');
    renderAccounts();
    secretInput.focus();
  });

  saveBtn.addEventListener('click', () => {
    const secret = secretInput.value.trim();
    const name   = accountNameInput.value.trim();
    if (!secret) return showToast('请输入密钥', 'error');
    if (!isValidBase32(secret)) return showToast('密钥格式无效', 'error');
    selectAccount(addAccount(name, secret));
    showToast('账户已保存', 'success');
  });

  scanBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

  function handleFile(file) {
    if (!file.type.startsWith('image/')) return showToast('请选择图片文件', 'error');
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const c = document.createElement('canvas');
        c.width = img.width; c.height = img.height;
        c.getContext('2d').drawImage(img, 0, 0);
        const d = c.getContext('2d').getImageData(0, 0, c.width, c.height);
        const code = jsQR(d.data, d.width, d.height);
        if (code) parseOtpAuth(code.data); else showToast('未检测到二维码', 'error');
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
    fileInput.value = '';
  }

  function parseOtpAuth(url) {
    try {
      const parsed = new URL(url);
      if (parsed.protocol !== 'otpauth:') return showToast('不是有效的 OTP 链接', 'error');
      const secret = parsed.searchParams.get('secret');
      const issuer = parsed.searchParams.get('issuer') || '';
      let label    = decodeURIComponent(parsed.pathname.substring(1));
      let name     = label.includes(':') ? label.split(':')[1].trim() : label;
      if (!secret) return showToast('二维码中未找到密钥', 'error');
      if (!isValidBase32(secret)) return showToast('密钥格式无效', 'error');
      secretInput.value      = secret.toUpperCase().replace(/\s/g, '');
      accountNameInput.value = name || issuer || '';
      currentSecret = secretInput.value;
      currentIssuer = issuer;
      currentLabel  = accountNameInput.value || '临时使用';
      currentAccountName.textContent = currentLabel;
      setCodeAvatar(currentLabel, issuer);
      codeArea.classList.remove('hidden');
      showToast('二维码识别成功', 'success');
      update();
    } catch { showToast('解析二维码失败', 'error'); }
  }

  secretInput.addEventListener('input', () => {
    const secret = secretInput.value.trim();
    clearBtn.classList.toggle('visible', !!secret);
    if (secret && isValidBase32(secret)) {
      currentSecret = secret;
      currentIssuer = '';
      currentLabel  = accountNameInput.value.trim() || '临时使用';
      currentAccountName.textContent = currentLabel;
      setCodeAvatar(currentLabel, '');
      codeArea.classList.remove('hidden');
    }
    update();
  });

  accountNameInput.addEventListener('input', () => {
    if (!currentSecret) return;
    currentLabel = accountNameInput.value.trim() || '临时使用';
    currentAccountName.textContent = currentLabel;
    setCodeAvatar(currentLabel, currentIssuer);
  });

  function isValidBase32(s) {
    const c = s.toUpperCase().replace(/\s/g, '');
    return c.length > 0 && /^[A-Z2-7]+=*$/.test(c);
  }

  function base32ToBytes(b) {
    const alpha = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
    let bits = '';
    b = b.toUpperCase().replace(/\s/g, '').replace(/=+$/, '');
    for (let i = 0; i < b.length; i++) {
      const v = alpha.indexOf(b[i]);
      if (v !== -1) bits += v.toString(2).padStart(5, '0');
    }
    const bytes = [];
    for (let i = 0; i + 8 <= bits.length; i += 8) bytes.push(parseInt(bits.slice(i, i + 8), 2));
    return new Uint8Array(bytes);
  }

  async function generateTOTP(secret, time = Date.now(), period = 30) {
    const key = base32ToBytes(secret);
    if (!key.length) return '000000';
    const counter = Math.floor(time / 1000 / period);
    const buf = new ArrayBuffer(8);
    new DataView(buf).setBigUint64(0, BigInt(counter));
    const k = await crypto.subtle.importKey('raw', key, { name: 'HMAC', hash: 'SHA-1' }, false, ['sign']);
    const h = new Uint8Array(await crypto.subtle.sign('HMAC', k, buf));
    const o = h[h.length - 1] & 0xf;
    const n = ((h[o]&0x7f)<<24)|((h[o+1]&0xff)<<16)|((h[o+2]&0xff)<<8)|(h[o+3]&0xff);
    return (n % 1000000).toString().padStart(6, '0');
  }

  async function update() {
    const secret   = secretInput.value.trim();
    const now      = Date.now();
    const second   = Math.floor(now / 1000) % 30;
    const timeLeft = 30 - second;
    const urgent   = timeLeft <= 5;

    if (!secret) {
      clearBtn.classList.remove('visible');
      if (!currentSecret) codeArea.classList.add('hidden');
      return;
    }
    clearBtn.classList.add('visible');

    const offset = CIRCUMFERENCE * (1 - timeLeft / 30);
    ringProg.style.strokeDashoffset = offset;
    ringProg.classList.toggle('urgent', urgent);
    ringText.textContent = timeLeft;
    progressBar.style.width = `${(timeLeft / 30) * 100}%`;
    progressBar.classList.toggle('urgent', urgent);
    timerBox.textContent = `${timeLeft} 秒后刷新`;

    if (!isValidBase32(secret)) {
      renderCode('无效密钥', true);
      timerBox.textContent = '请检查 Base32 格式';
      return;
    }
    try {
      renderCode(await generateTOTP(secret, now), false);
    } catch {
      renderCode('生成失败', true);
      timerBox.textContent = '计算错误';
    }
  }

  loadAccounts();
  setInterval(update, 1000);
  update();
});
</script>
