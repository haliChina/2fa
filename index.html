
<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2FA 验证码生成器</title>
  <style>
    :root {
      --primary-color: #4f46e5;
      --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      --card-bg: rgba(255, 255, 255, 0.8);
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --error-color: #ef4444;
      --success-color: #10b981;
    }

    * {
      box-sizing: border-box;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    body {
      background: var(--bg-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-main);
    }

    .wrapper {
      width: 100%;
      max-width: 440px;
      padding: 2rem;
    }

    .page-title {
      font-size: 2rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 2rem;
      background: linear-gradient(to right, #4f46e5, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.025em;
    }

    .container {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }

    .input-group {
      position: relative;
      margin-bottom: 1.5rem;
    }

    input {
      width: 100%;
      padding: 1rem 1.25rem;
      font-size: 1.1rem;
      background: rgba(255, 255, 255, 0.9);
      border: 2px solid transparent;
      border-radius: 14px;
      outline: none;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    input:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }

    .clear-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: #e5e7eb;
      color: #6b7280;
      border: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      opacity: 0;
      visibility: hidden;
    }

    .clear-btn.visible {
      opacity: 1;
      visibility: visible;
    }

    .clear-btn:hover {
      background: #d1d5db;
      color: #374151;
    }

    .code-area {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .code-card {
      position: relative;
      background: #fff;
      border-radius: 18px;
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      border: 1px solid #edf2f7;
      overflow: hidden;
    }

    .code-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    .code-card:active {
      transform: translateY(0);
    }

    .code-display {
      font-size: 3rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      letter-spacing: 0.1em;
      color: var(--primary-color);
      margin: 0.5rem 0;
    }

    .code-display.invalid {
      color: var(--error-color);
      font-size: 1.5rem;
    }

    .tooltip {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #374151;
      color: white;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 0.75rem;
      opacity: 0;
      pointer-events: none;
    }

    .code-card:hover .tooltip {
      opacity: 1;
    }

    .progress-container {
      width: 100%;
      height: 6px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: var(--primary-color);
      width: 0%;
      border-radius: 999px;
    }

    .timer-text {
      text-align: center;
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: 0.5rem;
      font-weight: 500;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

<div class="wrapper">
  <div class="page-title">2FA Authenticator - 2FA 验证器</div>

  <div class="container">
    <div class="input-group">
      <input type="text" id="secret" placeholder="输入 2FA 密钥 (Base32)" spellcheck="false" autocomplete="off" />
      <button id="clearBtn" class="clear-btn" title="清空">✕</button>
    </div>

    <div id="codeArea" class="code-area hidden">
      <div class="code-card" id="codeCard">
        <div id="tooltip" class="tooltip">复制</div>
        <div id="codeBox" class="code-display">000000</div>
        <div class="timer-text" id="timerBox">即将更新...</div>
      </div>

      <div class="progress-container">
        <div id="progressBar" class="progress-bar"></div>
      </div>
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const codeCard = document.getElementById('codeCard');
    const tooltipEl = document.getElementById('tooltip');
    const codeBox = document.getElementById('codeBox');
    const timerBox = document.getElementById('timerBox');
    const progressBar = document.getElementById('progressBar');
    const secretInput = document.getElementById('secret');
    const clearBtn = document.getElementById('clearBtn');
    const codeArea = document.getElementById('codeArea');

    clearBtn.addEventListener('click', () => {
      secretInput.value = '';
      update();
      secretInput.focus();
    });

    codeCard.addEventListener('click', () => {
      const text = codeBox.textContent;
      if (text === '无效密钥' || text === '生成失败') return;
      
      navigator.clipboard.writeText(text).then(() => {
        const oldText = tooltipEl.textContent;
        tooltipEl.textContent = '已复制';
        tooltipEl.style.opacity = '1';
        setTimeout(() => {
          tooltipEl.textContent = oldText;
          tooltipEl.style.opacity = '';
        }, 2000);
      });
    });

    function isValidBase32(secret) {
      const clean = secret.toUpperCase().replace(/\s/g, '');
      return clean.length > 0 && /^[A-Z2-7]+=*$/.test(clean);
    }

    function base32ToBytes(base32) {
      const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
      let bits = '';
      base32 = base32.toUpperCase().replace(/\s/g, '').replace(/=+$/, '');
      for (let i = 0; i < base32.length; i++) {
        const val = alphabet.indexOf(base32[i]);
        if (val === -1) continue;
        bits += val.toString(2).padStart(5, '0');
      }
      const bytes = [];
      for (let i = 0; i + 8 <= bits.length; i += 8) {
        bytes.push(parseInt(bits.slice(i, i + 8), 2));
      }
      return new Uint8Array(bytes);
    }

    async function generateTOTP(secret, time = Date.now(), period = 30) {
      const key = base32ToBytes(secret);
      if (key.length === 0) return '000000';
      const counter = Math.floor(time / 1000 / period);
      const buffer = new ArrayBuffer(8);
      new DataView(buffer).setBigUint64(0, BigInt(counter));
      const cryptoKey = await crypto.subtle.importKey('raw', key, { name: 'HMAC', hash: 'SHA-1' }, false, ['sign']);
      const hmac = new Uint8Array(await crypto.subtle.sign('HMAC', cryptoKey, buffer));
      const offset = hmac[hmac.length - 1] & 0xf;
      const code =
        ((hmac[offset] & 0x7f) << 24) |
        ((hmac[offset + 1] & 0xff) << 16) |
        ((hmac[offset + 2] & 0xff) << 8) |
        (hmac[offset + 3] & 0xff);
      return (code % 1000000).toString().padStart(6, '0');
    }

    async function update() {
      const secret = secretInput.value.trim();
      const now = Date.now();
      const second = Math.floor(now / 1000) % 30;
      const timeLeft = 30 - second;
      const progress = (timeLeft / 30) * 100;

      if (secret.length > 0) {
        clearBtn.classList.add('visible');
        const newHash = '#' + encodeURIComponent(secret);
        if (window.location.hash !== newHash) {
          history.replaceState(null, '', newHash);
        }
        codeArea.classList.remove('hidden');
      } else {
        clearBtn.classList.remove('visible');
        if (window.location.hash !== '') {
          history.replaceState(null, '', window.location.pathname);
        }
        codeArea.classList.add('hidden');
        return;
      }

      progressBar.style.width = `${progress}%`;
      if (timeLeft <= 5) {
        progressBar.style.background = 'var(--error-color)';
      } else {
        progressBar.style.background = 'var(--primary-color)';
      }

      if (!isValidBase32(secret)) {
        codeBox.textContent = '无效密钥';
        codeBox.classList.add('invalid');
        timerBox.textContent = '请检查 Base32 格式';
        return;
      }

      try {
        const code = await generateTOTP(secret, now);
        codeBox.textContent = code;
        codeBox.classList.remove('invalid');
        timerBox.textContent = `${timeLeft} 秒后更新`;
      } catch (e) {
        codeBox.textContent = '生成失败';
        codeBox.classList.add('invalid');
        timerBox.textContent = '计算错误';
      }
    }

    const hashSecret = decodeURIComponent(window.location.hash.substring(1));
    if (hashSecret) {
      secretInput.value = hashSecret;
      update();
    }

    setInterval(update, 1000);
    update();
    secretInput.addEventListener('input', update);
  });
</script>
</body>
</html>
